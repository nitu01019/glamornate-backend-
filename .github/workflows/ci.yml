# CI for the public mirror.
# Backend is npm-island (per the project's pnpm/npm workspace split).
# functions/ is the deployable unit; root has only configs + scripts.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  functions:
    name: Functions (build + test)
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: functions
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test (non-emulator)
        run: npm test
