# Firestore + Storage rules test job.

name: Firebase Rules Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - 'firestore.rules'
      - 'storage.rules'
      - 'functions/src/__tests__/firestore-rules.test.ts'

jobs:
  rules:
    name: Firestore Rules
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java (for Firestore emulator)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Firebase tools
        run: npm install -g firebase-tools

      - name: Install function deps
        working-directory: functions
        run: npm install

      - name: Run rules tests via emulator
        run: |
          firebase emulators:exec --only firestore \
            "cd functions && npm run test:rules" \
            --project demo-glamornate
